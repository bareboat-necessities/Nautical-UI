name: build

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y cmake ninja-build pkg-config libgtkmm-4.0-dev
      - name: Configure
        run: cmake --preset linux-debug
      - name: Build
        run: cmake --build --preset linux-debug
      - name: Test
        run: ctest --test-dir build/linux-debug --output-on-failure

  windows-msys2:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4
      - uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            git
            mingw-w64-ucrt-x86_64-toolchain
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-ninja
            mingw-w64-ucrt-x86_64-pkgconf
            mingw-w64-ucrt-x86_64-gtkmm-4.0
      - name: Configure
        run: cmake --preset windows-msys2-ucrt64-debug
      - name: Build
        run: cmake --build --preset windows-msys2-ucrt64-debug
      - name: Test
        run: ctest --test-dir build/windows-ucrt64-debug --output-on-failure
